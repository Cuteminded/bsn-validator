name: publish to NPM

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
      - name: Publish to npm
        run: npm publish
